# font_family IoskeleyMonoNL Nerd Font
font_size 20
disable_ligatures always

cursor_shape block
cursor_blink_interval 0
cursor_trail 3
cursor_trail_start_threshold 20

background #090B10
hide_window_decorations titlebar-only
window_padding_width 4

mouse_hide_wait 0
confirm_os_window_close 0
shell_integration no-title no-cursor
allow_remote_control yes

macos_option_as_alt yes
macos_quit_when_last_window_closed yes

map_timeout 1.0

tab_bar_edge bottom 
tab_bar_min_tabs 1
tab_bar_style custom
tab_separator " "
tab_bar_filter session:~
tab_title_template "{index}"
active_tab_title_template "{index}"

map f12>f launch --type=overlay --allow-remote-control /bin/zsh -lc 'KITTY_SESSIONIZER_HOLD=1 kitty-sessionizer'
map f12>w launch --type=overlay --allow-remote-control /bin/zsh -lc 'KITTY_SESSIONIZER_HOLD=1 kitty-worktree'
map f12>c new_tab_with_cwd
map f12>d close_tab
map f12>1 goto_tab 1
map f12>2 goto_tab 2
map f12>3 goto_tab 3
map f12>4 goto_tab 4
map f12>5 goto_tab 5
map f12>6 goto_tab 6
map f12>7 goto_tab 7
map f12>8 goto_tab 8
map f12>9 goto_tab 9

include current-theme.conf

tab_bar_background #090B10
active_tab_background #090B10
inactive_tab_background #090B10
active_tab_foreground #e0def4
inactive_tab_foreground #908caa
active_tab_font_style bold
inactive_tab_font_style normal


# BEGIN_KITTY_FONTS
font_family      family="Ioskeley Mono Term"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
