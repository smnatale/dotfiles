set -g prefix F12
unbind C-b

set -g mouse on
set -g focus-events on
set -g escape-time 0
set -g base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g allow-rename off
set -g allow-set-title off

set -g status-position bottom
set -g status-style "bg=#090B10"
set -g status-left-length 0
set -g status-right-length 64 
set -g status-left ""
set -g status-right "#[fg=#908caa]#(echo #{pane_current_path} | sed \"s|^$HOME|~|\") "

setw -g window-status-format "#[fg=#6e6a86] #I"
setw -g window-status-current-format "#[fg=#e0def4,bold] #I"
setw -g window-status-separator ""

# Vi mode for copy/scroll
setw -g mode-keys vi

# Copy mode entry
bind Escape copy-mode
bind -T prefix Escape copy-mode

# Copy mode navigation
bind -T copy-mode-vi j send-keys -X scroll-down
bind -T copy-mode-vi k send-keys -X scroll-up
bind -T copy-mode-vi C-u send-keys -X half-page-up
bind -T copy-mode-vi C-d send-keys -X half-page-down
bind -T copy-mode-vi C-f send-keys -X page-down
bind -T copy-mode-vi C-b send-keys -X page-up
bind -T copy-mode-vi g send-keys -X history-top
bind -T copy-mode-vi G send-keys -X history-bottom
bind -T copy-mode-vi w send-keys -X next-word
bind -T copy-mode-vi b send-keys -X previous-word
bind -T copy-mode-vi / send-keys -X search-forward
bind -T copy-mode-vi ? send-keys -X search-reverse
bind -T copy-mode-vi n send-keys -X search-again
bind -T copy-mode-vi N send-keys -X search-reverse

# Copy/paste actions
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi q send-keys -X cancel

bind c new-window -c "#{pane_current_path}"
bind f popup -w 100% -h 40% -x C -y 9999 -E "$HOME/.config/tmux/tmux-sessionizer.sh"
bind w popup -w 100% -h 40% -x C -y 9999 -E "$HOME/.config/tmux/tmux-worktree.sh"
bind r source-file ~/.tmux.conf
bind g popup -d "#{pane_current_path}" -w 90% -h 90% -E "lazygit"

# Splits (matching neovim's prefix + v / prefix + h)
bind v split-window -h -c "#{pane_current_path}"
bind h split-window -v -c "#{pane_current_path}"

# Pane navigation (uppercase to not clash with splits)
bind H select-pane -L
bind J select-pane -D
bind K select-pane -U
bind L select-pane -R
