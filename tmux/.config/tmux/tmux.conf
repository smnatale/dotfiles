unbind C-b
set -g prefix F12
bind C-s send-prefix

set -a terminal-features "tmux-256color:RGB"
set -g base-index 1
set -g mode-keys vi
set -g status-position top
set -g status-justify absolute-centre
set -g status-interval 5
set -g status-left-length 64
set -g status-right-length 96
set -g status-style "bg=default,fg=#e0def4"
set -g status-left "#[bg=#c4a7e7,fg=#0c0c0c,bold] #S #[bg=default] "
set -g status-right "#{?client_prefix,#[bg=#f6c177]#[fg=#0c0c0c]#[bold] PREFIX #[bg=default],}"
set -g window-status-separator " "
set -g window-status-style "bg=default,fg=#908caa"
set -g window-status-last-style "bg=default,fg=#908caa"
set -g window-status-activity-style "bg=default,fg=#908caa"
set -g window-status-format "#[bg=default,fg=#908caa] #I:#W "
set -g window-status-current-format "#[bg=#c4a7e7,fg=#0c0c0c,bold] #I:#W "
set -g message-style "bg=#0c0c0c,fg=#e0def4"
set -g message-command-style "bg=#0c0c0c,fg=#e0def4"
set -g mode-style "bg=#c4a7e7,fg=#0c0c0c,bold"
set -g pane-border-style "bg=default,fg=#312f44"
set -g pane-active-border-style "bg=default,fg=#c4a7e7"
set -g display-panes-colour "#908caa"
set -g display-panes-active-colour "#c4a7e7"
set -g history-limit 50000
set -g renumber-windows on
set -g focus-events on
set -g allow-rename off
set -g allow-set-title off
set -g set-titles off
setw -g automatic-rename off

setw -g mouse on

bind r source-file ~/.config/tmux/tmux.conf
unbind Escape
bind [ copy-mode
bind m copy-mode
bind q kill-pane
bind s split-window -h -c "#{pane_current_path}"
bind v split-window -v -l "20%" -c "#{pane_current_path}"
bind g popup -d "#{pane_current_path}" -w 90% -h 90% -E "lazygit"
bind p popup -d "#{pane_current_path}" -w 90% -h 90% -E ""
bind f popup -w 100% -h 50% -x C -y 100 -E "~/.local/bin/tmux-sessionizer"

bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send-keys -X cancel
